<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <title>Forgot Password - TrailPack</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    /* Page-specific tweaks for the forgot-password flow.
       Re-uses the auth-page / auth-box look from styles.css so this
       page renders identically to login.html and register.html. */
    .back-to-login {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--accent);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
      margin-bottom: var(--space-4);
      transition: color var(--transition-fast);
    }
    .back-to-login:hover { color: var(--primary); }

    .step-indicator {
      text-align: center;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: var(--space-4);
    }
    .step-progress {
      display: flex;
      gap: 6px;
      justify-content: center;
      margin-top: var(--space-2);
    }
    .step-progress span {
      width: 28px;
      height: 4px;
      border-radius: 2px;
      background: #E5E7EB;
      transition: background var(--transition-fast);
    }
    .step-progress span.active { background: var(--accent); }

    .question-display {
      background: var(--bg-light);
      border-left: 3px solid var(--accent);
      padding: var(--space-3) var(--space-4);
      border-radius: var(--radius-sm);
      margin-bottom: var(--space-4);
      color: var(--text-primary);
      font-weight: 500;
      font-size: 0.95rem;
    }
    .question-display .label {
      display: block;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: var(--space-1);
    }

    /* Steps are toggled via the .is-active class. Keeping them in
       the DOM (rather than re-rendering) preserves any in-flight
       state if the user navigates back/forward in the same tab. */
    .step { display: none; }
    .step.is-active { display: block; }
  </style>
</head>
<body class="auth-page">
  <div class="auth-container">
    <div class="auth-box">
      <a href="login.html" class="back-to-login" id="back-to-login">← Back to Login</a>

      <div class="auth-header">
        <h1><span class="logo-icon">⛺</span> TrailPack</h1>
        <p>Reset your password</p>
      </div>

      <div class="step-indicator">
        <span id="step-label">Step 1 of 3</span>
        <div class="step-progress" aria-hidden="true">
          <span id="dot-1" class="active"></span>
          <span id="dot-2"></span>
          <span id="dot-3"></span>
        </div>
      </div>

      <!-- ============================================================
           Step A — Find Account
           ============================================================ -->
      <form id="step-a" class="auth-form step is-active" autocomplete="off">
        <h2>Find your account</h2>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" autocomplete="email" required
                 placeholder="Enter your email">
        </div>
        <div id="error-a" class="error-message" style="display: none;"></div>
        <button type="submit" class="btn btn-primary btn-full" id="btn-a">Continue</button>
      </form>

      <!-- ============================================================
           Step B — Verify Answer
           ============================================================ -->
      <form id="step-b" class="auth-form step" autocomplete="off">
        <h2>Answer your security question</h2>
        <div class="question-display">
          <span class="label">Your security question</span>
          <span id="question-text">—</span>
        </div>
        <div class="form-group">
          <label for="answer">Your Answer</label>
          <input type="text" id="answer" name="answer" autocomplete="off" required
                 placeholder="Your answer">
          <small class="help-text">Case-insensitive — extra spaces are ignored</small>
        </div>
        <div id="error-b" class="error-message" style="display: none;"></div>
        <button type="submit" class="btn btn-primary btn-full" id="btn-b">Verify</button>
      </form>

      <!-- ============================================================
           Step C — Reset Password
           ============================================================ -->
      <form id="step-c" class="auth-form step" autocomplete="off">
        <h2>Set a new password</h2>
        <div class="form-group">
          <label for="new-password">New Password</label>
          <input type="password" id="new-password" name="newPassword" autocomplete="new-password" required
                 minlength="8" placeholder="Create a new password (min 8 characters)">
          <small class="help-text">Must be at least 8 characters</small>
        </div>
        <div class="form-group">
          <label for="confirm-password">Confirm New Password</label>
          <input type="password" id="confirm-password" name="confirmPassword" autocomplete="new-password" required
                 placeholder="Re-enter your new password">
        </div>
        <div id="error-c" class="error-message" style="display: none;"></div>
        <div id="success-c" class="success-message" style="display: none;"></div>
        <button type="submit" class="btn btn-primary btn-full" id="btn-c">Reset Password</button>
      </form>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="ui.js"></script>
  <script>
    /* ================================================================
       TrailPack — Forgot Password (security-question flow)
       ----------------------------------------------------------------
       Three sequential steps, single page. State is held in-memory:
         - email          : captured at step A
         - verified       : flipped true when step B succeeds
       The frontend never receives or stores the security answer.
       Step C is gated by the in-memory `verified` flag.
       ================================================================ */
    (function () {
      const API_URL = window.API_URL;

      const stepA = document.getElementById('step-a');
      const stepB = document.getElementById('step-b');
      const stepC = document.getElementById('step-c');
      const stepLabel = document.getElementById('step-label');
      const dots = [
        document.getElementById('dot-1'),
        document.getElementById('dot-2'),
        document.getElementById('dot-3'),
      ];

      const errA = document.getElementById('error-a');
      const errB = document.getElementById('error-b');
      const errC = document.getElementById('error-c');
      const okC = document.getElementById('success-c');

      const btnA = document.getElementById('btn-a');
      const btnB = document.getElementById('btn-b');
      const btnC = document.getElementById('btn-c');

      const state = { email: '', verified: false };

      // --- step navigation ---------------------------------------------------
      function showStep(n) {
        [stepA, stepB, stepC].forEach((s, i) => {
          s.classList.toggle('is-active', i === n - 1);
        });
        stepLabel.textContent = `Step ${n} of 3`;
        dots.forEach((d, i) => d.classList.toggle('active', i <= n - 1));
        // Reset the new step's input focus and clear any prior error.
        if (n === 1) { errA.style.display = 'none'; document.getElementById('email').focus(); }
        if (n === 2) { errB.style.display = 'none'; document.getElementById('answer').focus(); }
        if (n === 3) { errC.style.display = 'none'; document.getElementById('new-password').focus(); }
      }

      function showError(el, msg) {
        el.textContent = msg;
        el.style.display = 'block';
      }
      function hideError(el) { el.style.display = 'none'; }

      // --- Step A: lookup email & fetch question ----------------------------
      stepA.addEventListener('submit', async (e) => {
        e.preventDefault();
        hideError(errA);
        const email = document.getElementById('email').value.trim();
        if (!email) {
          showError(errA, 'Please enter your email');
          return;
        }
        btnA.disabled = true;
        btnA.textContent = 'Looking up account...';
        try {
          const res = await fetch(`${API_URL}/auth/forgot/get-question`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email }),
          });
          const data = await res.json().catch(() => ({}));
          if (!res.ok) {
            // 404 → "no account"; 409 → legacy account without question.
            if (res.status === 404) {
              showError(errA, 'No account found with that email');
            } else {
              showError(errA, data.message || 'Could not look up account');
            }
            return;
          }
          state.email = email;
          document.getElementById('question-text').textContent = data.securityQuestion || '';
          showStep(2);
        } catch (_) {
          showError(errA, 'Network error. Please try again.');
        } finally {
          btnA.disabled = false;
          btnA.textContent = 'Continue';
        }
      });

      // --- Step B: verify answer --------------------------------------------
      stepB.addEventListener('submit', async (e) => {
        e.preventDefault();
        hideError(errB);
        const answer = document.getElementById('answer').value;
        if (!answer.trim()) {
          showError(errB, 'Please enter your answer');
          return;
        }
        btnB.disabled = true;
        btnB.textContent = 'Verifying...';
        try {
          const res = await fetch(`${API_URL}/auth/forgot/verify-answer`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email: state.email, answer }),
          });
          const data = await res.json().catch(() => ({}));
          if (!res.ok) {
            showError(errB, data.message || 'Could not verify answer');
            return;
          }
          if (!data.success) {
            showError(errB, 'Incorrect answer, try again');
            return;
          }
          state.verified = true;
          showStep(3);
        } catch (_) {
          showError(errB, 'Network error. Please try again.');
        } finally {
          btnB.disabled = false;
          btnB.textContent = 'Verify';
        }
      });

      // --- Step C: reset password -------------------------------------------
      stepC.addEventListener('submit', async (e) => {
        e.preventDefault();
        hideError(errC);
        okC.style.display = 'none';
        if (!state.verified) {
          // Defensive: if the user reaches step C without verifying
          // (e.g. via dev tools), bounce them back to the start.
          showError(errC, 'Please verify your security answer first');
          showStep(1);
          return;
        }
        const newPassword = document.getElementById('new-password').value;
        const confirmPassword = document.getElementById('confirm-password').value;
        if (newPassword.length < 8) {
          showError(errC, 'Password must be at least 8 characters');
          return;
        }
        if (newPassword !== confirmPassword) {
          showError(errC, 'Passwords do not match');
          return;
        }
        btnC.disabled = true;
        btnC.textContent = 'Resetting...';
        try {
          const res = await fetch(`${API_URL}/auth/forgot/reset-password`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email: state.email, newPassword }),
          });
          const data = await res.json().catch(() => ({}));
          if (!res.ok) {
            showError(errC, data.message || 'Could not reset password');
            return;
          }
          okC.textContent = 'Password reset successfully! Redirecting...';
          okC.style.display = 'block';
          setTimeout(() => { window.location.href = 'login.html'; }, 2000);
        } catch (_) {
          showError(errC, 'Network error. Please try again.');
          btnC.disabled = false;
          btnC.textContent = 'Reset Password';
        }
      });
    })();
  </script>
</body>
</html>
