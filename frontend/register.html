<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <title>Register - TrailPack</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="auth-page">
  <div class="auth-container">
    <div class="auth-box">
      <div class="auth-header">
        <h1><span class="logo-icon">⛺</span> TrailPack</h1>
        <p>Smart Camping Trip Planner</p>
      </div>
      
      <form id="register-form" class="auth-form">
        <h2>Create Account</h2>
        
        <div class="form-group">
          <label for="name">Full Name</label>
          <input type="text" id="name" name="name" autocomplete="name" required placeholder="Enter your full name">
        </div>
        
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" autocomplete="email" required placeholder="Enter your email">
        </div>
        
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" autocomplete="new-password" required 
                 minlength="6" placeholder="Create a password (min 6 characters)">
          <small class="help-text">Must be at least 6 characters</small>
        </div>
        
        <div class="form-group">
          <label for="confirm-password">Confirm Password</label>
          <input type="password" id="confirm-password" name="confirm-password" autocomplete="new-password" required 
                 placeholder="Confirm your password">
        </div>

        <div class="form-group">
          <label for="security-question">Security Question</label>
          <select id="security-question" name="securityQuestion" required>
            <option value="What was the name of your first pet?">What was the name of your first pet?</option>
            <option value="What city were you born in?">What city were you born in?</option>
            <option value="What is your mother's maiden name?">What is your mother's maiden name?</option>
            <option value="What was your elementary school name?">What was your elementary school name?</option>
            <option value="What was the make of your first car?">What was the make of your first car?</option>
          </select>
          <small class="help-text">Used to recover your account if you forget your password</small>
        </div>

        <div class="form-group">
          <label for="security-answer">Your Answer</label>
          <input type="text" id="security-answer" name="securityAnswer" autocomplete="off" required
                 placeholder="Your answer">
          <small class="help-text">Case-insensitive — extra spaces are ignored</small>
        </div>

        <div id="error-message" class="error-message" style="display: none;"></div>
        <div id="success-message" class="success-message" style="display: none;"></div>
        
        <button type="submit" class="btn btn-primary btn-full">Create Account</button>
        
        <div class="auth-links">
          <p>Already have an account? <a href="login.html">Login</a></p>
        </div>
      </form>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="ui.js"></script>
  <script>
    const API_URL = window.API_URL;

    // Handle register form submission
    document.getElementById('register-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const name = document.getElementById('name').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirm-password').value;
      const securityQuestion = document.getElementById('security-question').value;
      const securityAnswer = document.getElementById('security-answer').value;
      const errorDiv = document.getElementById('error-message');
      const successDiv = document.getElementById('success-message');
      const submitBtn = e.target.querySelector('button[type="submit"]');
      
      // Validation
      if (password !== confirmPassword) {
        errorDiv.textContent = 'Passwords do not match';
        errorDiv.style.display = 'block';
        return;
      }
      
      if (password.length < 6) {
        errorDiv.textContent = 'Password must be at least 6 characters';
        errorDiv.style.display = 'block';
        return;
      }

      if (!securityQuestion || !securityAnswer.trim()) {
        errorDiv.textContent = 'Please choose a security question and provide an answer';
        errorDiv.style.display = 'block';
        return;
      }

      try {
        submitBtn.disabled = true;
        submitBtn.textContent = 'Creating account...';
        errorDiv.style.display = 'none';
        successDiv.style.display = 'none';
        
        const response = await fetch(`${API_URL}/auth/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, password, securityQuestion, securityAnswer })
        });
        
        const data = await response.json();
        
        if (!response.ok) {
          throw new Error(data.message || 'Registration failed');
        }
        
        // Show success message
        successDiv.textContent = 'Account created successfully! Redirecting to login...';
        successDiv.style.display = 'block';
        
        // Redirect to login after short delay
        setTimeout(() => {
          window.location.href = 'login.html';
        }, 1500);
        
      } catch (error) {
        errorDiv.textContent = error.message;
        errorDiv.style.display = 'block';
        submitBtn.disabled = false;
        submitBtn.textContent = 'Create Account';
      }
    });
  </script>
</body>
</html>
