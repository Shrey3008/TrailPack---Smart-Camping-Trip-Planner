<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - TrailPack</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="dashboard.css">
</head>
<body>
  <nav class="navbar">
    <div class="nav-brand">
      <h1>TrailPack</h1>
      <span class="tagline">Smart Camping Trip Planner</span>
    </div>
    <div class="nav-links">
      <span id="user-name" class="user-greeting"></span>
      <a href="#" class="nav-link" id="admin-link" style="display: none;">Admin</a>
      <a href="profile.html" class="nav-link">Profile</a>
      <button class="btn btn-secondary" id="logout-btn">Logout</button>
    </div>
  </nav>

  <main class="container dashboard-container">
    <!-- Header -->
    <div class="dashboard-header">
      <h2>Your Trips</h2>
      <button class="btn btn-primary" onclick="window.location.href='create-trip.html'">
        + Create New Trip
      </button>
    </div>

    <!-- Trips Grid -->
    <div id="trips-grid" class="trips-grid">
      <!-- Trips will be loaded here -->
    </div>

    <!-- Empty State -->
    <div id="empty-state" class="empty-state" style="display: none;">
      <div class="empty-icon">🏕️</div>
      <h3>No trips yet</h3>
      <p>Create your first camping trip to get started!</p>
      <button class="btn btn-primary" onclick="window.location.href='create-trip.html'">
        Create Trip
      </button>
    </div>

    <!-- Shared Trips Section -->
    <div id="shared-trips-section" class="shared-trips-section" style="display: none;">
      <div class="section-header">
        <h2>Shared With You</h2>
        <p class="section-subtitle">Trips shared by other users</p>
      </div>
      <div id="shared-trips-grid" class="trips-grid"></div>
    </div>
  </main>

  <script src="app.js"></script>
  <script src="auth.js"></script>
  <script src="dashboard.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      checkAuth();
      loadDashboard();
    });
  </script>
</body>
</html>
