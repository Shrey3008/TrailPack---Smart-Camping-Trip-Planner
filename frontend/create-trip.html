<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Trip - TrailPack</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <nav class="navbar">
    <div class="nav-brand">
      <h1><span class="logo-icon">⛺</span> TrailPack</h1>
    </div>
    <div class="nav-links">
      <a href="index.html" class="nav-link">← Back to Dashboard</a>
    </div>
  </nav>

  <main class="container">
    <div class="form-container">
      <h2>Create New Trip</h2>
      <p class="form-subtitle">Fill in the details to generate your custom packing checklist</p>

      <form id="create-trip-form">
        <div class="form-group">
          <label for="trip-name">Trip Name *</label>
          <input type="text" id="trip-name" name="name" required placeholder="e.g., Spiti Valley Adventure">
        </div>

        <div class="form-group">
          <label>Terrain Type *</label>
          <div class="selector-group">
            <label class="selector-card" onclick="selectTerrain('Mountain')">
              <input type="radio" name="terrain" value="Mountain" required>
              <span class="selector-icon">🏔️</span>
              <span class="selector-label">Mountain</span>
            </label>
            <label class="selector-card" onclick="selectTerrain('Forest')">
              <input type="radio" name="terrain" value="Forest" required>
              <span class="selector-icon">🌲</span>
              <span class="selector-label">Forest</span>
            </label>
            <label class="selector-card" onclick="selectTerrain('Desert')">
              <input type="radio" name="terrain" value="Desert" required>
              <span class="selector-icon">🏜️</span>
              <span class="selector-label">Desert</span>
            </label>
          </div>
          <!-- Hidden input for JS compatibility -->
          <input type="hidden" id="terrain" required>
        </div>

        <div class="form-group">
          <label>Season *</label>
          <div class="selector-group">
            <label class="selector-card" onclick="selectSeason('Spring')">
              <input type="radio" name="season" value="Spring" required>
              <span class="selector-icon">🌸</span>
              <span class="selector-label">Spring</span>
            </label>
            <label class="selector-card" onclick="selectSeason('Summer')">
              <input type="radio" name="season" value="Summer" required>
              <span class="selector-icon">☀️</span>
              <span class="selector-label">Summer</span>
            </label>
            <label class="selector-card" onclick="selectSeason('Fall')">
              <input type="radio" name="season" value="Fall" required>
              <span class="selector-icon">🍂</span>
              <span class="selector-label">Fall</span>
            </label>
            <label class="selector-card" onclick="selectSeason('Winter')">
              <input type="radio" name="season" value="Winter" required>
              <span class="selector-icon">❄️</span>
              <span class="selector-label">Winter</span>
            </label>
          </div>
          <!-- Hidden input for JS compatibility -->
          <input type="hidden" id="season" required>
        </div>

        <div class="form-group">
          <label for="duration">Duration (days) *</label>
          <div class="stepper-input">
            <button type="button" class="stepper-btn" onclick="adjustDuration(-1)">−</button>
            <input type="number" id="duration" name="duration" required min="1" max="30" value="3">
            <button type="button" class="stepper-btn" onclick="adjustDuration(1)">+</button>
          </div>
        </div>

        <div class="form-group">
          <label for="start-date">Start Date</label>
          <input type="date" id="start-date" name="startDate">
        </div>

        <div class="form-group">
          <label for="end-date">End Date</label>
          <input type="date" id="end-date" name="endDate">
        </div>

        <div class="form-actions">
          <button type="button" class="btn btn-secondary" onclick="window.location.href='index.html'">
            Cancel
          </button>
          <button type="submit" class="btn btn-primary btn-lg">
            Generate My Checklist →
          </button>
        </div>
      </form>
    </div>
  </main>

  <script src="app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      checkAuth();
      document.getElementById('create-trip-form').addEventListener('submit', handleCreateTrip);
    });

    function selectTerrain(terrain) {
      document.querySelectorAll('input[type="radio"][name="terrain"]').forEach(input => {
        input.closest('.selector-card').classList.remove('selected');
      });
      document.querySelector(`input[type="radio"][value="${terrain}"]`).checked = true;
      document.querySelector(`input[type="radio"][value="${terrain}"]`).closest('.selector-card').classList.add('selected');
      // Update hidden input for JS compatibility
      document.getElementById('terrain').value = terrain;
    }

    function selectSeason(season) {
      document.querySelectorAll('input[type="radio"][name="season"]').forEach(input => {
        input.closest('.selector-card').classList.remove('selected');
      });
      document.querySelector(`input[type="radio"][value="${season}"]`).checked = true;
      document.querySelector(`input[type="radio"][value="${season}"]`).closest('.selector-card').classList.add('selected');
      // Update hidden input for JS compatibility
      document.getElementById('season').value = season;
    }

    function adjustDuration(delta) {
      const input = document.getElementById('duration');
      let value = parseInt(input.value) || 0;
      value = Math.max(1, Math.min(30, value + delta));
      input.value = value;
    }
  </script>
</body>
</html>
