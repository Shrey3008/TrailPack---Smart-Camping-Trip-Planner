<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <title>TrailPack — Smart Camping Trip Planner</title>
  <link rel="stylesheet" href="styles.css">

  <!-- Design-system fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap">

  <style>
    /* =========================================================================
       TrailPack Dashboard — scoped design-system overrides.
       Applied ONLY on this page. Targets app.js-rendered markup so we don't
       need to touch any other files.
       ========================================================================= */
    :root {
      --green:       #2D6A4F;
      --green-dark:  #1B4332;
      --green-light: #52B788;
      --green-pale:  #D8F3DC;
      --cream:       #F5F7F5;
      --surface:     #FFFFFF;
      --ink:         #1b2422;
      --ink-soft:    #5a6560;
      --line:        #E3EAE5;
      --danger:      #C0392B;
      --danger-soft: #F9E2DE;
      --shadow-sm:   0 1px 2px rgba(15, 36, 28, 0.04), 0 2px 8px rgba(15, 36, 28, 0.05);
      --shadow-md:   0 8px 24px rgba(15, 36, 28, 0.10);
      --radius:      14px;
    }

    /* Dark theme — activated by [data-theme="dark"] on <html>. */
    html[data-theme="dark"] {
      --cream:       #0F1713;
      --surface:     #17231D;
      --ink:         #E6EDE7;
      --ink-soft:    #9BA8A1;
      --line:        #233129;
      --green-pale:  #1F3B2C;
      --shadow-sm:   0 1px 2px rgba(0,0,0,0.30), 0 2px 8px rgba(0,0,0,0.35);
      --shadow-md:   0 10px 28px rgba(0,0,0,0.45);
    }
    html[data-theme="dark"] .trip-badge { color: #C8E6C9 !important; }
    html[data-theme="dark"] .empty-state { border-color: var(--line); }
    html[data-theme="dark"] .tp-ct-modal input,
    html[data-theme="dark"] .tp-ct-modal select {
      background: #101A14;
      color: var(--ink);
      border-color: var(--line);
    }
    html[data-theme="dark"] .tp-ct-cancel:hover { background: #1E2C23; }
    html[data-theme="dark"] .section-sub { color: var(--ink-soft); }

    html, body {
      background: var(--cream) !important;
      color: var(--ink);
      font-family: 'Inter', system-ui, -apple-system, Segoe UI, Roboto, sans-serif !important;
      font-weight: 400;
      letter-spacing: -0.005em;
    }
    body { margin: 0; }

    /* ---------- Navbar ---------- */
    .navbar {
      background: var(--green-dark) !important;
      color: #fff !important;
      padding: 18px 32px !important;
      display: flex !important;
      align-items: center !important;
      justify-content: space-between !important;
      box-shadow: 0 1px 0 rgba(0,0,0,0.04);
    }
    .nav-brand { display: flex; align-items: center; gap: 12px; }
    .nav-brand h1,
    .nav-brand .brand-text {
      font-family: 'Playfair Display', Georgia, serif !important;
      font-weight: 700 !important;
      font-size: 1.55rem !important;
      color: #fff !important;
      letter-spacing: 0.005em;
      margin: 0 !important;
    }
    .nav-brand .logo-mark {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 38px;
      height: 38px;
      border-radius: 10px;
      background: rgba(82, 183, 136, 0.15);
    }
    .nav-brand .logo-mark svg { display: block; }

    .nav-user {
      display: flex !important;
      align-items: center !important;
      gap: 10px !important;
      flex-wrap: wrap;
    }
    .nav-user .user-name,
    .nav-user #user-info {
      color: rgba(255,255,255,0.88) !important;
      font-weight: 500 !important;
      font-size: 0.92rem !important;
      margin-right: 6px;
    }

    /* Pill buttons in navbar. Override existing .btn.btn-ghost + buttons. */
    .navbar .btn,
    .navbar a.btn,
    .navbar button {
      font-family: 'Inter', sans-serif !important;
      font-weight: 500 !important;
      font-size: 0.85rem !important;
      line-height: 1 !important;
      padding: 8px 16px !important;
      border-radius: 999px !important;
      border: 1px solid rgba(255,255,255,0.35) !important;
      background: transparent !important;
      color: #fff !important;
      cursor: pointer;
      text-decoration: none !important;
      transition: background 0.15s ease, border-color 0.15s ease, transform 0.15s ease;
    }
    .navbar .btn:hover,
    .navbar a.btn:hover,
    .navbar button:hover {
      background: rgba(255,255,255,0.10) !important;
      border-color: rgba(255,255,255,0.65) !important;
    }
    /* Logout = red outlined pill */
    .navbar .btn-logout,
    .navbar button[onclick*="logout"] {
      border-color: rgba(255, 138, 128, 0.55) !important;
      color: #FFBFBA !important;
    }
    .navbar .btn-logout:hover,
    .navbar button[onclick*="logout"]:hover {
      background: rgba(192, 57, 43, 0.20) !important;
      border-color: #FF8A80 !important;
      color: #fff !important;
    }

    /* ---------- Layout ---------- */
    main.container {
      max-width: 1200px;
      margin: 32px auto !important;
      padding: 0 24px !important;
    }

    /* ---------- Stat cards ---------- */
    .stats-bar {
      display: grid !important;
      grid-template-columns: repeat(4, 1fr) !important;
      gap: 20px !important;
      margin-bottom: 36px !important;
      /* Guard against any rule in styles.css that might hide the row. */
      visibility: visible !important;
      opacity: 1 !important;
      height: auto !important;
      min-height: 92px;
      overflow: visible !important;
      position: relative;
      z-index: 1;
    }
    .stat-card {
      background: var(--surface) !important;
      border: 1px solid var(--line) !important;
      border-radius: var(--radius) !important;
      padding: 20px !important;
      display: flex !important;
      align-items: center !important;
      gap: 16px !important;
      box-shadow: var(--shadow-sm) !important;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
      visibility: visible !important;
      opacity: 1 !important;
    }
    .stat-card:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-md) !important;
    }
    .stat-card .stat-icon {
      flex: 0 0 52px;
      width: 52px; height: 52px;
      border-radius: 12px;
      background: var(--green-pale) !important;
      color: var(--green) !important;
      display: grid !important;
      place-items: center !important;
      font-size: 1.55rem !important;
    }
    .stat-card .stat-content { display: flex; flex-direction: column; }
    .stat-card .stat-value {
      font-family: 'Inter', sans-serif !important;
      font-size: 2rem !important;
      font-weight: 700 !important;
      line-height: 1.1 !important;
      color: var(--ink) !important;
      letter-spacing: -0.015em;
    }
    .stat-card .stat-label {
      font-size: 0.72rem !important;
      font-weight: 600 !important;
      letter-spacing: 0.08em !important;
      text-transform: uppercase !important;
      color: var(--ink-soft) !important;
      margin-top: 2px;
    }

    /* ---------- Section header ---------- */
    .section-header {
      display: flex !important;
      align-items: flex-start !important;
      justify-content: space-between !important;
      gap: 16px;
      margin-bottom: 16px !important;
    }
    .section-header-left { display: flex; flex-direction: column; gap: 4px; }
    .section-header h2 {
      font-family: 'Playfair Display', Georgia, serif !important;
      font-weight: 700 !important;
      font-size: 1.75rem !important;
      color: var(--ink) !important;
      margin: 0 !important;
      letter-spacing: -0.005em;
    }
    .section-sub {
      font-family: 'Inter', sans-serif;
      font-size: 0.88rem;
      font-weight: 400;
      color: var(--ink-soft);
      margin: 0;
      font-style: italic;
      letter-spacing: 0.005em;
    }

    /* ---------- Filter tabs ---------- */
    .filter-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 0 0 22px;
    }
    .filter-tab {
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      font-size: 0.85rem;
      padding: 8px 16px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: var(--surface);
      color: var(--ink-soft);
      cursor: pointer;
      transition: background 0.15s ease, color 0.15s ease, border-color 0.15s ease, transform 0.15s ease;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .filter-tab:hover {
      color: var(--ink);
      border-color: var(--green-light);
    }
    .filter-tab.is-active {
      background: var(--green);
      color: #fff;
      border-color: var(--green);
      box-shadow: 0 4px 12px rgba(45, 106, 79, 0.28);
    }
    .filter-tab.is-active:hover { background: var(--green-dark); border-color: var(--green-dark); }
    .trip-card.is-hidden-by-filter { display: none !important; }
    .section-header .btn.btn-primary {
      font-family: 'Inter', sans-serif !important;
      font-weight: 600 !important;
      font-size: 0.88rem !important;
      padding: 10px 20px !important;
      border-radius: 999px !important;
      background: var(--green) !important;
      color: #fff !important;
      border: 0 !important;
      cursor: pointer;
      box-shadow: 0 1px 0 rgba(27, 67, 50, 0.2), 0 6px 18px rgba(45, 106, 79, 0.28);
      transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
    }
    .section-header .btn.btn-primary:hover {
      background: var(--green-dark) !important;
      transform: translateY(-1px);
    }

    .dashboard-section { margin-bottom: 48px; }

    /* ---------- Trip grid & trip cards ----------
       app.js renders: .trip-card > h3, .trip-meta > .trip-badge*, .trip-date,
       .trip-actions > .btn.btn-primary + .btn.btn-danger.
       We skin them and then enhance via the small script at the bottom. */
    .trips-grid {
      display: grid !important;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)) !important;
      gap: 22px !important;
    }
    .trip-card {
      background: var(--surface) !important;
      border: 1px solid var(--line) !important;
      border-radius: var(--radius) !important;
      padding: 22px !important;
      box-shadow: var(--shadow-sm) !important;
      transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
      display: flex !important;
      flex-direction: column !important;
      gap: 14px !important;
      position: relative;
    }
    .trip-card:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow-md) !important;
      border-color: rgba(82, 183, 136, 0.45) !important;
    }
    .trip-card h3 {
      font-family: 'Inter', sans-serif !important;
      font-size: 1.05rem !important;
      font-weight: 700 !important;
      color: var(--ink) !important;
      margin: 0 !important;
      letter-spacing: -0.005em;
    }
    .trip-meta {
      display: flex !important;
      flex-wrap: wrap !important;
      gap: 6px !important;
    }
    .trip-badge {
      background: var(--green-pale) !important;
      color: var(--green-dark) !important;
      border-radius: 999px !important;
      padding: 4px 10px !important;
      font-size: 0.72rem !important;
      font-weight: 600 !important;
      letter-spacing: 0.01em;
      text-transform: capitalize;
    }
    /* Season badges are rendered by app.js renderSeasonBadge() with
       inline styles using !important so each season gets its own emoji
       palette (see SEASON_EMOJI in app.js). Plain .trip-badge rules
       above still apply for padding / radius / font. */
    .trip-date {
      font-size: 0.78rem !important;
      color: var(--ink-soft) !important;
      font-weight: 500 !important;
    }
    /* Terrain emoji row — injected by script below. Emoji sits top-left,
       above the trip name. Created-date stays in its original spot. */
    .tp-card-top {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      margin-bottom: -4px;
    }
    .tp-card-top .tp-terrain-emoji {
      font-size: 1.75rem !important;
      line-height: 1;
      display: inline-block;
    }
    /* Progress block */
    .tp-progress-block {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-top: 2px;
    }
    .tp-progress-label {
      display: flex;
      justify-content: space-between;
      font-size: 0.78rem;
      color: var(--ink-soft);
      font-weight: 500;
    }
    .tp-progress-label strong {
      color: var(--ink);
      font-weight: 600;
    }
    .tp-progress-bar {
      height: 8px;
      width: 100%;
      background: var(--green-pale);
      border-radius: 999px;
      overflow: hidden;
    }
    .tp-progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--green-light), var(--green));
      border-radius: 999px;
      transition: width 0.5s ease;
    }

    /* Trip card buttons */
    .trip-actions {
      display: flex !important;
      gap: 10px !important;
      margin-top: auto !important;
    }
    .trip-card .trip-actions .btn {
      font-family: 'Inter', sans-serif !important;
      font-weight: 600 !important;
      font-size: 0.82rem !important;
      padding: 9px 16px !important;
      border-radius: 999px !important;
      border: 0 !important;
      cursor: pointer;
      transition: transform 0.15s ease, background 0.15s ease, color 0.15s ease, box-shadow 0.15s ease;
    }
    .trip-card .trip-actions .btn.btn-primary {
      background: var(--green) !important;
      color: #fff !important;
      box-shadow: 0 4px 12px rgba(45, 106, 79, 0.22);
    }
    .trip-card .trip-actions .btn.btn-primary:hover {
      background: var(--green-dark) !important;
      transform: translateY(-1px);
    }
    .trip-card .trip-actions .btn.btn-danger {
      background: transparent !important;
      color: var(--danger) !important;
      border: 1px solid var(--danger) !important;
    }
    .trip-card .trip-actions .btn.btn-danger:hover {
      background: var(--danger) !important;
      color: #fff !important;
    }

    /* ---------- Empty state ---------- */
    .empty-state {
      background: var(--surface);
      border: 1px dashed var(--line);
      border-radius: var(--radius);
      padding: 48px 24px;
      text-align: center;
      box-shadow: var(--shadow-sm);
    }
    .empty-state .empty-icon { font-size: 2.75rem; margin-bottom: 12px; }
    .empty-state h3 {
      font-family: 'Playfair Display', Georgia, serif;
      font-weight: 600;
      font-size: 1.4rem;
      color: var(--ink);
      margin: 0 0 6px;
    }
    .empty-state p {
      color: var(--ink-soft);
      margin: 0 0 18px;
    }
    .empty-state .btn.btn-primary {
      background: var(--green) !important;
      color: #fff !important;
      border: 0 !important;
      padding: 10px 22px !important;
      border-radius: 999px !important;
      font-weight: 600 !important;
      cursor: pointer;
    }

    /* ---------- Create Trip modal ---------- */
    .tp-ct-overlay {
      position: fixed; inset: 0;
      background: rgba(15, 36, 28, 0.45);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      display: flex; align-items: center; justify-content: center;
      z-index: 1200;
      opacity: 0;
      transition: opacity 0.22s ease;
    }
    .tp-ct-overlay.open { opacity: 1; }
    .tp-ct-modal {
      background: var(--surface);
      border-radius: 18px;
      width: min(520px, 92vw);
      padding: 28px 28px 24px;
      box-shadow: 0 30px 80px rgba(15, 36, 28, 0.35);
      transform: translateY(24px) scale(0.98);
      opacity: 0;
      transition: transform 0.28s cubic-bezier(.2,.8,.2,1), opacity 0.22s ease;
    }
    .tp-ct-overlay.open .tp-ct-modal {
      transform: translateY(0) scale(1);
      opacity: 1;
    }
    .tp-ct-modal h3 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--ink);
      margin: 0 0 4px;
    }
    .tp-ct-modal p.tp-ct-sub {
      color: var(--ink-soft);
      margin: 0 0 20px;
      font-size: 0.92rem;
    }
    .tp-ct-modal .tp-field {
      display: flex; flex-direction: column;
      margin-bottom: 14px;
    }
    .tp-ct-modal .tp-field label {
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--ink-soft);
      margin-bottom: 6px;
    }
    .tp-ct-modal input,
    .tp-ct-modal select {
      font-family: inherit;
      font-size: 0.95rem;
      padding: 11px 14px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
      color: var(--ink);
      outline: none;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }
    .tp-ct-modal input:focus,
    .tp-ct-modal select:focus {
      border-color: var(--green-light);
      box-shadow: 0 0 0 3px rgba(82, 183, 136, 0.18);
    }
    .tp-ct-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .tp-ct-actions {
      display: flex; justify-content: flex-end; gap: 10px;
      margin-top: 18px;
    }
    .tp-ct-actions button {
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      font-size: 0.9rem;
      padding: 10px 20px;
      border-radius: 999px;
      border: 0;
      cursor: pointer;
      transition: transform 0.15s ease, background 0.15s ease;
    }
    .tp-ct-cancel {
      background: transparent;
      color: var(--ink-soft);
      border: 1px solid var(--line) !important;
    }
    .tp-ct-cancel:hover {
      background: var(--cream);
      color: var(--ink);
    }
    .tp-ct-confirm {
      background: var(--green);
      color: #fff;
      box-shadow: 0 6px 18px rgba(45, 106, 79, 0.28);
    }
    .tp-ct-confirm:hover { background: var(--green-dark); transform: translateY(-1px); }
    .tp-ct-confirm:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    /* ---------- Destination autocomplete ---------- */
    .tp-ac-wrap { position: relative; }
    .tp-ac-dropdown {
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      right: 0;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(15, 36, 28, 0.12);
      max-height: 260px;
      overflow-y: auto;
      z-index: 50;
      padding: 4px;
    }
    html[data-theme="dark"] .tp-ac-dropdown { background: var(--surface); border-color: var(--line); }
    .tp-ac-item {
      padding: 9px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13.5px;
      color: var(--ink);
      display: flex;
      flex-direction: column;
      gap: 2px;
      transition: background-color .12s ease, color .12s ease;
    }
    .tp-ac-item:hover, .tp-ac-item.is-active {
      background: rgba(122, 158, 126, 0.18);
      color: var(--green-dark);
    }
    html[data-theme="dark"] .tp-ac-item:hover, html[data-theme="dark"] .tp-ac-item.is-active {
      background: rgba(82, 183, 136, 0.20);
      color: #DDF1E2;
    }
    .tp-ac-item .ac-name { font-weight: 600; }
    .tp-ac-item .ac-meta { font-size: 11.5px; color: var(--ink-soft); }
    .tp-ac-item:hover .ac-meta, .tp-ac-item.is-active .ac-meta {
      color: var(--green-dark);
      opacity: 0.85;
    }
    html[data-theme="dark"] .tp-ac-item:hover .ac-meta, html[data-theme="dark"] .tp-ac-item.is-active .ac-meta {
      color: #BFE0C8;
    }
    .tp-ac-empty {
      padding: 9px 12px;
      font-size: 13px;
      color: var(--ink-soft);
    }
    .tp-ac-hint {
      font-size: 11.5px;
      color: var(--ink-soft);
      margin: 4px 0 0 0;
    }
    .tp-ac-hint.is-confirmed { color: var(--green); font-weight: 500; }

    /* ---------- Date ↔ duration sync hint ---------- */
    .tp-date-hint {
      font-size: 12px;
      color: var(--green);
      font-weight: 500;
      margin: -4px 0 4px 2px;
      letter-spacing: 0.005em;
    }
    html[data-theme="dark"] .tp-date-hint { color: var(--green-light); }

    /* ---------- Style ui.js confirm modal + toast to match the design ---------- */
    .tp-modal-overlay {
      background: rgba(15, 36, 28, 0.45) !important;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }
    .tp-modal {
      border-radius: 18px !important;
      box-shadow: 0 30px 80px rgba(15, 36, 28, 0.35) !important;
      padding: 26px !important;
      font-family: 'Inter', sans-serif !important;
    }
    .tp-modal-title {
      font-family: 'Playfair Display', Georgia, serif !important;
      font-weight: 600 !important;
      font-size: 1.3rem !important;
      color: var(--ink) !important;
    }
    .tp-modal-body {
      color: var(--ink-soft) !important;
      font-size: 0.95rem !important;
    }
    .tp-modal-actions .btn {
      border-radius: 999px !important;
      padding: 10px 20px !important;
      font-weight: 600 !important;
    }
    .tp-modal-actions .tp-modal-cancel {
      background: transparent !important;
      border: 1px solid var(--line) !important;
      color: var(--ink-soft) !important;
    }
    .tp-modal-actions .tp-modal-confirm {
      background: var(--danger) !important;
      color: #fff !important;
      border: 0 !important;
    }

    /* Toasts — dark forest green, bottom-right, slide up */
    .tp-toast-container {
      bottom: 24px !important;
      right: 24px !important;
      left: auto !important;
      top: auto !important;
    }
    .tp-toast {
      background: var(--green-dark) !important;
      color: #fff !important;
      border-radius: 12px !important;
      padding: 12px 16px !important;
      font-family: 'Inter', sans-serif !important;
      box-shadow: 0 18px 40px rgba(15, 36, 28, 0.35) !important;
      animation: tp-toast-rise 0.25s ease-out both;
    }
    .tp-toast-success { background: var(--green) !important; }
    .tp-toast-error   { background: var(--danger) !important; }
    .tp-toast-warning { background: #B45309 !important; }
    @keyframes tp-toast-rise {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0);    }
    }

    /* ---------- Responsive ---------- */
    @media (max-width: 900px) {
      .stats-bar { grid-template-columns: repeat(2, 1fr) !important; }
      .navbar { padding: 16px 20px !important; }
      .nav-user .user-name,
      .nav-user #user-info { display: none !important; }
    }
    @media (max-width: 560px) {
      .stats-bar { grid-template-columns: 1fr !important; }

      .section-header { flex-direction: column; align-items: flex-start; gap: 10px; }
      .trip-card .trip-actions { flex-direction: column; }
      .trip-card .trip-actions .btn { width: 100%; }
    }

    /* =========================================================================
       Dashboard polish v2 — design system parity with admin / organizer pages.
       ========================================================================= */

    /* Stat cards: colored left accents + Playfair display numbers */
    .stats-bar .stat-card {
      position: relative;
      overflow: hidden;
      padding: 22px 22px 20px 26px !important;
    }
    .stats-bar .stat-card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 5px;
      background: var(--green);
    }
    .stats-bar .stat-card:nth-child(1)::before { background: #2D6A4F; }            /* sage green */
    .stats-bar .stat-card:nth-child(2)::before { background: #C4704F; }            /* terracotta */
    .stats-bar .stat-card:nth-child(3)::before { background: #6B8FA6; }            /* dusty blue */
    .stats-bar .stat-card:nth-child(4)::before { background: #C4A84F; }            /* golden */

    .stats-bar .stat-card:nth-child(1) .stat-icon { background: rgba(45,106,79,0.12) !important; color: #2D6A4F !important; }
    .stats-bar .stat-card:nth-child(2) .stat-icon { background: rgba(196,112,79,0.14) !important; color: #C4704F !important; }
    .stats-bar .stat-card:nth-child(3) .stat-icon { background: rgba(107,143,166,0.16) !important; color: #4F7287 !important; }
    .stats-bar .stat-card:nth-child(4) .stat-icon { background: rgba(196,168,79,0.18) !important; color: #8B7833 !important; }

    .stats-bar .stat-card .stat-value {
      font-family: 'Playfair Display', Georgia, serif !important;
      font-size: 2.6rem !important;
      font-weight: 700 !important;
      line-height: 1 !important;

    }

      font-size: 0.7rem !important;
      letter-spacing: 0.09em !important;

    .stats-bar .stat-card:hover { transform: translateY(-3px); }

    /* "Your Trips" section: wrap header + filters + content in one unified card */
    main.container > section.dashboard-section {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 16px;

    main.container > section.dashboard-section .section-header h2 { font-size: 1.55rem !important; }
    main.container > section.dashboard-section .filter-tabs { margin: 0 0 18px !important; }

  <script src="config.js"></script>

  <script>
    // ---------- Boot ----------
    document.addEventListener('DOMContentLoaded', () => {
      checkAuth();
      loadTrips();
      loadStats();
      if (typeof loadSharedTrips === 'function') loadSharedTrips();

      if (window.currentUser) {
        const userInfo = document.getElementById('user-info');
        userInfo.textContent = `${window.currentUser.name} (${window.currentUser.role || 'user'})`;

        const adminBtn = document.getElementById('admin-panel-btn');
        if (window.currentUser.role === 'admin') {
          adminBtn.style.display = 'inline-block';
        } else {
          adminBtn.style.display = 'none';
        }
        if (window.currentUser.role === 'organizer' || window.currentUser.role === 'admin') {
          const orgLink = document.getElementById('organizer-link');
          if (orgLink) orgLink.style.display = 'inline-block';
        }
      }

      wireCreateTripModal();
      wireDestinationAutocomplete();
      wireDateDurationSync();
      wireTripCardEnhancer();
      wireFilterTabs();
      wireThemeToggle();
    });

    // ---------- Theme toggle ----------
    function applyTheme(theme) {
      const root = document.documentElement;
      const btn = document.getElementById('theme-toggle');
      if (theme === 'dark') {
        root.setAttribute('data-theme', 'dark');
        if (btn) { btn.textContent = '☀️'; btn.setAttribute('aria-label', 'Switch to light theme'); }
      } else {
        root.removeAttribute('data-theme');
        if (btn) { btn.textContent = '🌙'; btn.setAttribute('aria-label', 'Switch to dark theme'); }
      }
    }
    function wireThemeToggle() {
      // Default to light. Existing users who explicitly chose 'dark' via the
      // toggle keep their saved preference; we deliberately ignore the OS-level
      // prefers-color-scheme so first-paint always matches the brand light theme.
      const stored = localStorage.getItem('tp-theme');
      applyTheme(stored === 'dark' ? 'dark' : 'light');
      document.getElementById('theme-toggle')?.addEventListener('click', () => {
        const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        applyTheme(next);
        localStorage.setItem('tp-theme', next);
      });
    }

    // ---------- Filter tabs ----------
    function wireFilterTabs() {
      const tabs = document.querySelectorAll('#trip-filters .filter-tab');
      tabs.forEach(tab => {
        tab.addEventListener('click', () => {
          tabs.forEach(t => {
            t.classList.remove('is-active');
            t.setAttribute('aria-selected', 'false');
          });
          tab.classList.add('is-active');
          tab.setAttribute('aria-selected', 'true');
          applyTripFilter(tab.dataset.filter || 'all');
        });
      });
    }
    function applyTripFilter(filter) {
      const container = document.getElementById('trips-container');
      if (!container) return;
      const cards = container.querySelectorAll('.trip-card');
      cards.forEach(card => {
        if (filter === 'all') {
          card.classList.remove('is-hidden-by-filter');
          return;
        }
        const firstBadge = card.querySelector('.trip-meta .trip-badge');
        const terrain = (firstBadge?.textContent || '').trim().toLowerCase();
        const match = terrain === filter || terrain.startsWith(filter);
        card.classList.toggle('is-hidden-by-filter', !match);
      });
    }

    /* ============================================================
       Date ↔ duration auto-sync for the Plan-a-new-trip modal
       Keeps startDate, endDate and duration consistent without
       ever showing a validation error. Re-entrancy is gated by
       a `syncing` flag so programmatic .value writes don't
       re-fire the cascading change listeners.
       Convention: duration is the number of *nights*, so
       endDate = startDate + duration days.
       ============================================================ */
    function wireDateDurationSync() {
      const startEl = document.getElementById('tp-ct-start');
      const endEl   = document.getElementById('tp-ct-end');
      const durEl   = document.getElementById('tp-ct-duration');
      const hint    = document.getElementById('tp-date-hint');
      if (!startEl || !endEl || !durEl) return;

      const DAY_MS = 86400000;
      let syncing = false;

      // Parse a YYYY-MM-DD <input type="date"> value as a UTC midnight
      // Date so day-arithmetic is unaffected by the user's timezone.
      function parseISO(s) {
        if (!s) return null;
        const m = s.match(/^(\d{4})-(\d{2})-(\d{2})$/);
        if (!m) return null;
        const d = new Date(Date.UTC(+m[1], +m[2] - 1, +m[3]));
        return isNaN(d.getTime()) ? null : d;
      }
      function toISO(d) {
        const y = d.getUTCFullYear();
        const mo = String(d.getUTCMonth() + 1).padStart(2, '0');
        const dd = String(d.getUTCDate()).padStart(2, '0');
        return `${y}-${mo}-${dd}`;
      }
      function diffNights(a, b) { return Math.round((b - a) / DAY_MS); }
      function fmt(d) {
        return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric', timeZone: 'UTC' });
      }
      function clampDur(n) { return Math.min(60, Math.max(1, n | 0)); }
      function setSilently(el, v) { syncing = true; el.value = v; syncing = false; }

      function refreshHint() {
        const start = parseISO(startEl.value);
        const end   = parseISO(endEl.value);
        const dur   = parseInt(durEl.value, 10);
        if (start && end && end > start) {
          const n = diffNights(start, end);
          hint.textContent = `\uD83D\uDCC5 ${n} ${n === 1 ? 'night' : 'nights'} \u00B7 ${fmt(start)} \u2013 ${fmt(end)}`;
          hint.hidden = false;
        } else if (start && dur > 0) {
          const projEnd = new Date(start.getTime() + dur * DAY_MS);
          hint.textContent = `\uD83D\uDCC5 ${dur} ${dur === 1 ? 'night' : 'nights'} \u00B7 ${fmt(start)} \u2013 ${fmt(projEnd)}`;
          hint.hidden = false;
        } else {
          hint.hidden = true;
          hint.textContent = '';
        }
      }

      startEl.addEventListener('change', () => {
        if (syncing) return;
        const start = parseISO(startEl.value);
        const end   = parseISO(endEl.value);
        const dur   = clampDur(parseInt(durEl.value, 10) || 1);
        if (start) {
          // If end is missing or now <= start, project a fresh end from
          // the current duration. Otherwise keep end and re-sync duration.
          if (!end || end <= start) {
            setSilently(endEl, toISO(new Date(start.getTime() + dur * DAY_MS)));
          } else {
            const n = clampDur(diffNights(start, end));
            setSilently(durEl, String(n));
          }
        }
        refreshHint();
      });

      endEl.addEventListener('change', () => {
        if (syncing) return;
        const start = parseISO(startEl.value);
        const end   = parseISO(endEl.value);
        if (start && end && end > start) {
          setSilently(durEl, String(clampDur(diffNights(start, end))));
        } else if (end && !start) {
          // No start yet: back-fill start from current duration so the
          // three fields stay consistent.
          const dur = clampDur(parseInt(durEl.value, 10) || 1);
          setSilently(startEl, toISO(new Date(end.getTime() - dur * DAY_MS)));
        }
        refreshHint();
      });

      durEl.addEventListener('input', () => {
        if (syncing) return;
        const dur   = parseInt(durEl.value, 10);
        const start = parseISO(startEl.value);
        if (dur > 0 && start) {
          setSilently(endEl, toISO(new Date(start.getTime() + dur * DAY_MS)));
        }
        refreshHint();
      });

      refreshHint();
    }

    /* ============================================================
       Destination autocomplete (Open-Meteo geocoding API, no key)
       Wires the Plan-a-new-trip modal's location input to a
       debounced city search. Picking a suggestion populates the
       hidden #tp-ct-lat / #tp-ct-lon fields, which the submit
       handler ships to POST /trips.
       ============================================================ */
    function wireDestinationAutocomplete() {
      const input    = document.getElementById('tp-ct-location');
      const dropdown = document.getElementById('tp-ac-dropdown');
      const hint     = document.getElementById('tp-ac-hint');
      const latEl    = document.getElementById('tp-ct-lat');
      const lonEl    = document.getElementById('tp-ct-lon');
      if (!input || !dropdown) return;

      let debounceTimer = null;
      let lastQuery = '';
      let activeIdx = -1;
      let suggestions = [];

      const escapeHtml = (s) =>
        String(s).replace(/[&<>"']/g, (c) =>
          ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c]));

      const formatLabel = (s) =>
        [s.name, s.admin1, s.country].filter(Boolean).join(', ');

      function clearCoords() {
        latEl.value = '';
        lonEl.value = '';
        hint.hidden = true;
        hint.classList.remove('is-confirmed');
      }
      function showHint(text, confirmed) {
        hint.textContent = text;
        hint.hidden = false;
        hint.classList.toggle('is-confirmed', !!confirmed);
      }
      function hideDropdown() {
        dropdown.hidden = true;
        dropdown.innerHTML = '';
        activeIdx = -1;
        input.setAttribute('aria-expanded', 'false');
      }
      function renderItems(list) {
        if (!list.length) {
          dropdown.innerHTML = '<div class="tp-ac-empty">No matches found</div>';
          dropdown.hidden = false;
          input.setAttribute('aria-expanded', 'true');
          return;
        }
        dropdown.innerHTML = list.map((s, i) => `
          <div class="tp-ac-item" role="option" data-i="${i}">
            <span class="ac-name">${escapeHtml(s.name)}</span>
            <span class="ac-meta">${escapeHtml([s.admin1, s.country].filter(Boolean).join(', '))}</span>
          </div>`).join('');
        dropdown.hidden = false;
        input.setAttribute('aria-expanded', 'true');
      }

      async function search(q) {
        try {
          const url = `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(q)}&count=8&language=en&format=json`;
          const res = await fetch(url);
          const data = await res.json();
          // Stale-response guard: bail if the user kept typing.
          if (input.value.trim() !== q) return;
          suggestions = (data.results || []).map((r) => ({
            name:   r.name,
            admin1: r.admin1 || '',
            country: r.country || '',
            lat:    r.latitude,
            lon:    r.longitude,
          }));
          renderItems(suggestions);
        } catch (e) {
          console.warn('[autocomplete] search failed', e);
          hideDropdown();
        }
      }

      input.addEventListener('input', () => {
        const q = input.value.trim();
        // Any free-typing invalidates a previous selection's lat/lon.
        clearCoords();
        if (debounceTimer) clearTimeout(debounceTimer);
        if (q.length < 2) { hideDropdown(); return; }
        if (q === lastQuery) return;
        lastQuery = q;
        debounceTimer = setTimeout(() => search(q), 300);
      });

      // mousedown (not click) so it fires before input blur hides the dropdown.
      dropdown.addEventListener('mousedown', (e) => {
        const item = e.target.closest('.tp-ac-item');
        if (!item) return;
        e.preventDefault();
        const i = parseInt(item.getAttribute('data-i'), 10);
        const s = suggestions[i];
        if (!s) return;
        input.value = formatLabel(s);
        latEl.value = s.lat;
        lonEl.value = s.lon;
        showHint(`\u2713 Coordinates locked: ${Number(s.lat).toFixed(3)}, ${Number(s.lon).toFixed(3)}`, true);
        hideDropdown();
      });

      input.addEventListener('keydown', (e) => {
        if (dropdown.hidden) return;
        const items = dropdown.querySelectorAll('.tp-ac-item');
        if (!items.length) return;
        if (e.key === 'ArrowDown') {
          e.preventDefault();
          activeIdx = Math.min(activeIdx + 1, items.length - 1);
        } else if (e.key === 'ArrowUp') {
          e.preventDefault();
          activeIdx = Math.max(activeIdx - 1, 0);
        } else if (e.key === 'Enter' && activeIdx >= 0) {
          e.preventDefault();
          items[activeIdx].dispatchEvent(new MouseEvent('mousedown', { bubbles: true }));
          return;
        } else if (e.key === 'Escape') {
          hideDropdown();
          return;
        } else {
          return;
        }
        items.forEach((el, i) => el.classList.toggle('is-active', i === activeIdx));
        items[activeIdx]?.scrollIntoView({ block: 'nearest' });
      });

      input.addEventListener('blur', () => setTimeout(hideDropdown, 150));
    }

    // ---------- Create Trip modal ----------
    function openCreateTripModal() {
      const ov = document.getElementById('tp-ct-overlay');
      ov.style.display = 'flex';
      requestAnimationFrame(() => ov.classList.add('open'));
      setTimeout(() => document.getElementById('tp-ct-name')?.focus(), 120);
    }
    function closeCreateTripModal() {
      const ov = document.getElementById('tp-ct-overlay');
      ov.classList.remove('open');
      setTimeout(() => { ov.style.display = 'none'; }, 220);
    }

    function wireCreateTripModal() {
      const open = () => openCreateTripModal();
      document.getElementById('open-create-trip')?.addEventListener('click', open);
      document.getElementById('open-create-trip-empty')?.addEventListener('click', open);

      const ov = document.getElementById('tp-ct-overlay');
      ov.addEventListener('click', (e) => { if (e.target === ov) closeCreateTripModal(); });
      document.getElementById('tp-ct-cancel').addEventListener('click', closeCreateTripModal);
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && ov.classList.contains('open')) closeCreateTripModal();
      });

      document.getElementById('tp-ct-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const submitBtn = document.getElementById('tp-ct-confirm');
        submitBtn.disabled = true;
        submitBtn.textContent = 'Creating…';

        // Pull lat/lon set by the destination autocomplete (empty when the
        // user typed a custom string without picking a suggestion).
        const latVal = document.getElementById('tp-ct-lat').value;
        const lonVal = document.getElementById('tp-ct-lon').value;
        const body = {
          name: document.getElementById('tp-ct-name').value.trim(),
          terrain: document.getElementById('tp-ct-terrain').value,
          season: document.getElementById('tp-ct-season').value,
          duration: parseInt(document.getElementById('tp-ct-duration').value, 10) || 1,
          groupSize: parseInt(document.getElementById('tp-ct-group-size').value, 10) || 1,
          location: document.getElementById('tp-ct-location').value.trim() || null,
          startDate: document.getElementById('tp-ct-start').value || null,
          endDate: document.getElementById('tp-ct-end').value || null,
        };
        if (latVal && lonVal) {
          body.lat = parseFloat(latVal);
          body.lon = parseFloat(lonVal);
        }

        try {
          // Reuse the shared helper from app.js so auth headers stay consistent.
          const result = await apiCallWithAuth('/trips', {
            method: 'POST',
            body: JSON.stringify(body),
          });
          const tripId = result?.trip?.tripId || result?.tripId;
          if (tripId) {
            sessionStorage.setItem('tripJustCreated', '1');
            window.location.href = `checklist.html?tripId=${tripId}`;
            return;
          }
          closeCreateTripModal();
          if (window.showToast) window.showToast('Trip created.', 'success');
          loadTrips();
          loadStats();
        } catch (err) {
          if (window.showToast) window.showToast(err?.message || 'Failed to create trip', 'error');
          else alert('Failed to create trip: ' + (err?.message || err));
        } finally {
          submitBtn.disabled = false;
          submitBtn.textContent = 'Create Trip';
        }
      });
    }

    // ---------- Trip card enhancer ----------
    // app.js renders bare trip cards. We observe the containers and decorate
    // each card with: (1) a top row (terrain emoji + created date) and
    // (2) a progress bar + "X of Y items packed". No other files touched.
    const TERRAIN_EMOJI = {
      mountain: '🏔️', mountains: '🏔️', alpine: '🏔️', snow: '🏔️',
      forest: '🌲', woods: '🌲', woodland: '🌲',
      desert: '🏜️', dunes: '🏜️',
      beach: '🏖️', coast: '🏖️', ocean: '🏖️',
      lake: '🛶', river: '🏞️', canyon: '🏞️', valley: '🏞️',
      tundra: '🥶', arctic: '🥶',
      jungle: '🌴', rainforest: '🌴', tropical: '🌴',
      plains: '🌾', prairie: '🌾', grassland: '🌾',
    };
    const itemCache = new Map(); // tripId -> { total, packed }

    async function fetchItemStats(tripId) {
      if (itemCache.has(tripId)) return itemCache.get(tripId);
      try {
        const items = await apiCallWithAuth(`/trips/${tripId}/items`);
        const arr = Array.isArray(items) ? items : (items?.items || []);
        const stats = {
          total: arr.length,
          packed: arr.filter(i => i.packed).length,
        };
        itemCache.set(tripId, stats);
        return stats;
      } catch (_) {
        return { total: 0, packed: 0 };
      }
    }

    function enhanceCard(card) {
      if (!card || card.dataset.tpEnhanced === '1') return;
      card.dataset.tpEnhanced = '1';

      // Extract terrain from the first badge + original created-date text.
      const firstBadge = card.querySelector('.trip-meta .trip-badge');
      const terrain = (firstBadge?.textContent || '').trim();
      const emoji = TERRAIN_EMOJI[terrain.toLowerCase()] || '⛺';
      const dateEl = card.querySelector('.trip-date');
      const dateText = (dateEl?.textContent || '').trim() || '';

      // Emoji row, placed as the very first child so it sits above the
      // trip name at the top-left of the card. Leave the original
      // .trip-date in place (below the badges).
      const top = document.createElement('div');
      top.className = 'tp-card-top';
      top.innerHTML = `<span class="tp-terrain-emoji" aria-hidden="true">${emoji}</span>`;
      card.insertBefore(top, card.firstChild);
      void dateText; // intentionally unused — we no longer move the date

      // Extract tripId from the card's inline onclick (app.js renders: viewChecklist('<id>')).
      const onclick = card.getAttribute('onclick') || '';
      const m = onclick.match(/viewChecklist\('([^']+)'\)/);
      const tripId = m ? m[1] : null;
      if (!tripId) return;

      // Insert progress block before .trip-actions
      const actions = card.querySelector('.trip-actions');
      const block = document.createElement('div');
      block.className = 'tp-progress-block';
      block.innerHTML = `
        <div class="tp-progress-label">
          <span><strong>0</strong> of <strong>0</strong> items packed</span>
          <span>0%</span>
        </div>
        <div class="tp-progress-bar"><div class="tp-progress-fill"></div></div>
      `;
      if (actions) card.insertBefore(block, actions);
      else card.appendChild(block);

      fetchItemStats(tripId).then(({ total, packed }) => {
        const pct = total > 0 ? Math.round((packed / total) * 100) : 0;
        const label = block.querySelector('.tp-progress-label');
        const fill  = block.querySelector('.tp-progress-fill');
        if (label) label.innerHTML = `
          <span><strong>${packed}</strong> of <strong>${total}</strong> items packed</span>
          <span>${pct}%</span>
        `;
        if (fill) fill.style.width = pct + '%';
      });
    }

    function wireTripCardEnhancer() {
      const containers = [
        document.getElementById('trips-container'),
        document.getElementById('shared-trips-container'),
      ].filter(Boolean);

      const sweep = (root) => root.querySelectorAll('.trip-card').forEach(enhanceCard);

      containers.forEach(c => {
        sweep(c);
        const obs = new MutationObserver(() => {
          sweep(c);
          // Re-apply the active filter to any newly rendered cards.
          const activeTab = document.querySelector('#trip-filters .filter-tab.is-active');
          if (activeTab) applyTripFilter(activeTab.dataset.filter || 'all');
        });
        obs.observe(c, { childList: true, subtree: false });
      });

      // Bust the per-trip cache whenever the user returns to the dashboard
      // (e.g. after packing items on the checklist page).
      window.addEventListener('pageshow', () => {
        itemCache.clear();
        containers.forEach(c => c.querySelectorAll('.trip-card').forEach(card => {
          delete card.dataset.tpEnhanced;
          card.querySelector('.tp-card-top')?.remove();
          card.querySelector('.tp-progress-block')?.remove();
          enhanceCard(card);
        }));
      });
    }
  </script>
</body>
</html>
