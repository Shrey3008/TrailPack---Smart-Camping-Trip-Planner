<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏔️</text></svg>">
  <title>Checklist · TrailPack</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <script src="config.js"></script>
  <style>
    /* =========================================================
       TrailPack checklist — matches dashboard design system
       ========================================================= */
    :root {
      --green:        #2D6A4F;
      --green-dark:   #1B4332;
      --green-light:  #52B788;
      --green-pale:   #D8F3DC;
      --cream:        #f5f0e8;
      --surface:      #FFFFFF;
      --ink:          #1a1a1a;
      --ink-soft:     #4a4a4a;
      --muted:        #6B7A72;
      --line:         #e4dfd4;
      --dashed:       #d4d1ca;
      --danger:       #c0392b;
      --row:          #f9f8f5;
      --row-checked:  #e8f5e9;
      --row-checked-ink: #6a9a6e;
      --radius:       16px;
      --radius-sm:    10px;
      --shadow-card:  0 2px 12px rgba(0,0,0,0.06);
    }
    html[data-theme="dark"] {
      --cream:        #0F1A15;
      --surface:      #152219;
      --ink:          #E8F1EA;
      --ink-soft:     #C8D4CC;
      --muted:        #8FA397;
      --line:         #24332B;
      --dashed:       #2E3F35;
      --green-pale:   #1F3C2C;
      --row:          #1A2620;
      --row-checked:  #234332;
      --row-checked-ink: #9BC8A4;
      --shadow-card:  0 2px 12px rgba(0,0,0,0.4);
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--cream);
      color: var(--ink);
      font-size: 15px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }
    h1, h2, h3, h4 { margin: 0; color: var(--ink); }

    /* ---------- Navbar (mirrors index.html) ---------- */
    .navbar {
      background: #1B4332;
      padding: 18px 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .nav-brand { display: flex; align-items: center; gap: 10px; }
    .nav-brand .logo-mark {
      display: inline-flex;
      width: 34px; height: 34px;
      border-radius: 10px;
      background: rgba(82,183,136,0.15);
      align-items: center; justify-content: center;
    }
    .nav-brand .brand-text {
      font-family: 'Playfair Display', Georgia, serif;
      font-weight: 700;
      font-size: 1.45rem;
      color: #fff;
      margin: 0;
      letter-spacing: -0.01em;
    }
    .nav-user { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .nav-user .btn {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.35);
      color: #fff;
      padding: 7px 14px;
      border-radius: 9999px;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      transition: background 0.15s, border-color 0.15s;
      font-family: inherit;
    }
    .nav-user .btn:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.6); }
    .nav-user .btn-logout { border-color: rgba(231,76,60,0.55); color: #ffd2cc; }
    .nav-user .btn-logout:hover { background: rgba(231,76,60,0.15); border-color: rgba(231,76,60,0.85); color: #fff; }
    .nav-user .btn-theme { padding: 6px 10px; font-size: 1rem; }

    /* ---------- Container ---------- */
    .container {
      max-width: 860px;
      margin: 0 auto;
      padding: 32px 20px 60px;
    }

    /* ---------- Trip header card ---------- */
    .trip-header {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow-card);
      padding: 24px 26px;
      margin-bottom: 20px;
    }
    .trip-header-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 4px;
    }
    .trip-header-left {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      min-width: 0;
    }
    .terrain-emoji {
      font-size: 1.75rem;
      line-height: 1;
      margin-top: 2px;
      flex-shrink: 0;
    }
    .trip-name {
      font-family: 'Playfair Display', Georgia, serif;
      font-weight: 700;
      font-size: 1.55rem;
      letter-spacing: -0.01em;
      color: var(--ink);
      word-break: break-word;
    }
    .trip-created {
      font-size: 0.8rem;
      color: var(--muted);
      white-space: nowrap;
      flex-shrink: 0;
      padding-top: 6px;
    }
    .trip-badges {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin: 14px 0 18px;
    }
    .trip-badge {
      background: var(--green-pale);
      color: var(--green-dark);
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.01em;
      text-transform: capitalize;
      border: 1px solid transparent;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }
    html[data-theme="dark"] .trip-badge { color: #C8E6C9; }
    /* season-badge carries its own palette via inline style */

    /* ---------- Progress ---------- */
    .progress-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.88rem;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .progress-row .pct { color: var(--green); font-weight: 700; }
    html[data-theme="dark"] .progress-row .pct { color: var(--green-light); }
    .progress-track {
      height: 10px;
      background: var(--green-pale);
      border-radius: 9999px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: var(--green);
      border-radius: 9999px;
      transition: width 0.4s ease;
    }

    /* ---------- Actions ---------- */
    .actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin: 4px 0 24px;
      flex-wrap: wrap;
    }
    .btn-action {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 11px 28px;
      border-radius: 9999px;
      font-size: 0.95rem;
      font-weight: 600;
      border: none;
      cursor: pointer;
      font-family: inherit;
      min-width: 180px;
      color: #fff;
      transition: transform 0.08s, filter 0.15s, opacity 0.15s;
    }
    .btn-action:hover:not(:disabled) { transform: translateY(-1px); filter: brightness(1.05); }
    .btn-action:disabled { opacity: 0.45; cursor: not-allowed; }
    .btn-start  { background: var(--green); }
    .btn-cancel { background: var(--danger); }

    /* ---------- Category cards ---------- */
    .category {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow-card);
      padding: 20px 22px;
      margin-bottom: 16px;
    }
    .category-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }
    .category-title {
      font-family: 'Playfair Display', Georgia, serif;
      font-weight: 700;
      font-size: 1.1rem;
      color: var(--ink);
    }
    .category-count {
      background: var(--line);
      color: var(--muted);
      padding: 3px 12px;
      border-radius: 9999px;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.02em;
    }
    .category-divider {
      border: none;
      border-bottom: 1.5px dashed var(--dashed);
      margin: 4px 0 14px;
    }

    /* ---------- Items ---------- */
    .items-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      border-radius: var(--radius-sm);
      background: var(--row);
      color: var(--ink);
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      user-select: none;
    }
    .item:focus-visible {
      outline: 2px solid var(--green-light);
      outline-offset: 2px;
    }
    .item:hover:not(.packed) { background: var(--green-pale); }
    .item.packed {
      background: var(--row-checked);
      color: var(--row-checked-ink);
    }
    .item.packed .item-name { text-decoration: line-through; }

    .item-check {
      flex-shrink: 0;
      width: 22px;
      height: 22px;
      border-radius: 6px;
      border: 2px solid var(--green);
      background: #fff;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
      font-weight: 800;
      color: transparent;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }
    html[data-theme="dark"] .item-check {
      background: var(--surface);
      border-color: var(--green-light);
    }
    .item.packed .item-check {
      background: var(--green);
      color: #fff;
    }
    .item.packed .item-check::before { content: '✓'; }
    html[data-theme="dark"] .item.packed .item-check {
      background: var(--green-light);
      color: var(--green-dark);
    }
    .item-name {
      flex: 1;
      font-size: 0.95rem;
    }

    /* ---------- Add item ---------- */
    .add-item-btn {
      margin-top: 12px;
      width: 100%;
      padding: 11px;
      border: 1.5px dashed var(--dashed);
      background: transparent;
      border-radius: var(--radius-sm);
      color: var(--muted);
      font-size: 0.88rem;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
    }
    .add-item-btn:hover {
      border-color: var(--green);
      color: var(--green);
      background: var(--green-pale);
    }
    .add-item-form {
      display: none;
      margin-top: 12px;
      gap: 8px;
      flex-wrap: wrap;
    }
    .add-item-form.open { display: flex; }
    .add-item-form input {
      flex: 1;
      min-width: 180px;
      padding: 10px 14px;
      border: 1px solid var(--line);
      border-radius: 9999px;
      font-size: 0.9rem;
      font-family: inherit;
      background: var(--surface);
      color: var(--ink);
    }
    .add-item-form input:focus {
      outline: none;
      border-color: var(--green-light);
      box-shadow: 0 0 0 3px rgba(82,183,136,0.22);
    }
    .add-item-form button {
      padding: 9px 18px;
      border-radius: 9999px;
      border: none;
      background: var(--green);
      color: #fff;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.88rem;
      transition: background 0.15s;
    }
    .add-item-form button:hover:not(:disabled) { background: var(--green-dark); }
    .add-item-form button.cancel {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--line);
    }
    .add-item-form button.cancel:hover { background: var(--line); }
    .add-item-form button:disabled { opacity: 0.6; cursor: not-allowed; }

    /* ---------- States ---------- */
    .loading, .empty {
      text-align: center;
      padding: 48px 20px;
      color: var(--muted);
      font-size: 0.95rem;
    }
    .empty strong { color: var(--ink); display: block; margin-bottom: 4px; font-family: 'Playfair Display', serif; font-size: 1.05rem; }

    /* ---------- Responsive ---------- */
    @media (max-width: 640px) {
      .navbar { padding: 14px 18px; flex-wrap: wrap; gap: 10px; }
      .nav-user { justify-content: flex-end; flex-wrap: wrap; }
      .container { padding: 20px 14px 40px; }
      .trip-header { padding: 20px 18px; }
      .trip-name { font-size: 1.3rem; }
      .trip-header-top { flex-direction: column; gap: 6px; }
      .trip-created { padding-top: 0; }
      .actions { flex-direction: column; }
      .btn-action { width: 100%; }
      .category { padding: 16px 18px; }
    }
  </style>
</head>
<body>
  <nav class="navbar" aria-label="Main">
    <div class="nav-brand">
      <span class="logo-mark" aria-hidden="true">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M3 20L9 9L13 15L16 11L21 20H3Z" fill="#52B788" stroke="#52B788" stroke-width="1.2" stroke-linejoin="round"/>
          <circle cx="16.5" cy="6.5" r="1.6" fill="#52B788"/>
        </svg>
      </span>
      <h1 class="brand-text">TrailPack</h1>
    </div>
    <div class="nav-user">
      <a href="index.html" class="btn">← Back to Dashboard</a>
      <a href="profile.html" class="btn">Profile</a>
      <a href="organizer.html" class="btn">Organizer</a>
      <button id="theme-toggle" class="btn btn-theme" type="button" aria-label="Toggle theme" title="Toggle theme">🌙</button>
      <button id="logout-btn" class="btn btn-logout" type="button">Logout</button>
    </div>
  </nav>

  <main class="container">
    <section class="trip-header" id="trip-header" hidden>
      <div class="trip-header-top">
        <div class="trip-header-left">
          <span class="terrain-emoji" id="terrain-emoji">⛺</span>
          <h2 class="trip-name" id="trip-name">Trip</h2>
        </div>
        <span class="trip-created" id="trip-created"></span>
      </div>
      <div class="trip-badges" id="trip-badges"></div>
      <div class="progress-row">
        <span id="progress-text">0 of 0 items packed</span>
        <span class="pct" id="progress-pct">0%</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="progress-fill" style="width:0%"></div>
      </div>
    </section>

    <div class="actions">
      <button class="btn-action btn-start" id="start-trip-btn" type="button" disabled>🚀 Start Trip</button>
      <button class="btn-action btn-cancel" id="cancel-trip-btn" type="button">✕ Cancel Trip</button>
    </div>

    <div id="categories"><div class="loading">Loading your checklist…</div></div>
  </main>

  <script>
    (function () {
      /* ---------- Theme (pre-paint to avoid flash) ---------- */
      const root = document.documentElement;
      const THEME_KEY = 'tp-theme';
      const applyTheme = (t) => {
        root.setAttribute('data-theme', t);
        const btn = document.getElementById('theme-toggle');
        if (btn) btn.textContent = t === 'dark' ? '☀️' : '🌙';
      };
      const savedTheme = localStorage.getItem(THEME_KEY);
      const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
      applyTheme(savedTheme || (prefersDark ? 'dark' : 'light'));

      /* ---------- Emoji maps ---------- */
      const TERRAIN_EMOJI = {
        mountain: '🏔️', mountains: '🏔️', alpine: '🏔️',
        forest: '🌲', woods: '🌲',
        desert: '🏜️',
        beach: '🏖️', coast: '🏖️',
        lake: '🏞️', river: '🏞️',
        snow: '❄️', arctic: '🧊',
        tropical: '🌴', jungle: '🌴',
        hills: '⛰️', valley: '⛰️',
      };
      const TERRAIN_DEFAULT = '⛺';
      const SEASON_EMOJI = {
        summer: { icon: '☀️', bg: '#FEF9C3', color: '#92400E', border: '#FDE68A' },
        winter: { icon: '❄️', bg: '#EFF6FF', color: '#1E40AF', border: '#BFDBFE' },
        fall:   { icon: '🍂', bg: '#FFF7ED', color: '#92400E', border: '#FED7AA' },
        autumn: { icon: '🍂', bg: '#FFF7ED', color: '#92400E', border: '#FED7AA' },
        spring: { icon: '🌸', bg: '#FDF2F8', color: '#9D174D', border: '#FBCFE8' },
      };

      /* ---------- Helpers ---------- */
      const escapeHtml = (s) => {
        const d = document.createElement('div');
        d.textContent = s == null ? '' : String(s);
        return d.innerHTML;
      };
      const cap = (s) => s ? s.charAt(0).toUpperCase() + s.slice(1).toLowerCase() : '';

      /* ---------- Auth + tripId ---------- */
      const API_URL = (window.API_URL || 'http://localhost:3000').replace(/\/$/, '');
      const token = sessionStorage.getItem('authToken');
      if (!token) { window.location.href = 'login.html'; return; }

      const params = new URLSearchParams(window.location.search);
      let tripId = params.get('tripId');
      if (!tripId) {
        const pending = sessionStorage.getItem('pendingTripId');
        if (pending) {
          tripId = pending;
          sessionStorage.removeItem('pendingTripId');
        } else {
          window.location.href = 'index.html';
          return;
        }
      }

      /* ---------- API wrapper ---------- */
      const api = async (path, options = {}) => {
        const res = await fetch(API_URL + path, {
          ...options,
          headers: {
            'Authorization': 'Bearer ' + token,
            'Content-Type': 'application/json',
            ...(options.headers || {}),
          },
        });
        if (res.status === 401) {
          sessionStorage.removeItem('authToken');
          window.location.href = 'login.html';
          throw new Error('unauthorized');
        }
        if (res.status === 204) return null;
        const text = await res.text();
        let data = null;
        try { data = text ? JSON.parse(text) : null; } catch { /* non-JSON */ }
        if (!res.ok) {
          const msg = (data && data.message) || ('HTTP ' + res.status);
          throw new Error(msg);
        }
        return data;
      };

      /* ---------- State ---------- */
      let trip = null;
      let items = [];

      /* ---------- Renderers ---------- */
      function renderHeader() {
        const header = document.getElementById('trip-header');
        header.hidden = false;

        const terrain = (trip.terrain || '').toLowerCase();
        document.getElementById('terrain-emoji').textContent =
          TERRAIN_EMOJI[terrain] || TERRAIN_DEFAULT;

        document.getElementById('trip-name').textContent = trip.name || 'Trip';

        const created = trip.createdAt ? new Date(trip.createdAt).toLocaleDateString() : '';
        document.getElementById('trip-created').textContent = created ? 'Created ' + created : '';

        const badges = [];
        if (trip.terrain) {
          badges.push(`<span class="trip-badge">${escapeHtml(cap(trip.terrain))}</span>`);
        }
        if (trip.season) {
          const s = SEASON_EMOJI[(trip.season || '').toLowerCase()];
          const label = escapeHtml(cap(trip.season));
          if (s) {
            badges.push(`<span class="trip-badge season" style="background:${s.bg};color:${s.color};border-color:${s.border};">${s.icon} ${label}</span>`);
          } else {
            badges.push(`<span class="trip-badge">${label}</span>`);
          }
        }
        if (trip.duration) {
          badges.push(`<span class="trip-badge">${Number(trip.duration)} days</span>`);
        }
        document.getElementById('trip-badges').innerHTML = badges.join('');

        updateProgress();
      }

      function updateProgress() {
        const total = items.length;
        const packed = items.filter(i => i.packed).length;
        const pct = total ? Math.round(packed / total * 100) : 0;
        document.getElementById('progress-fill').style.width = pct + '%';
        document.getElementById('progress-text').textContent =
          packed + ' of ' + total + ' items packed';
        document.getElementById('progress-pct').textContent = pct + '%';
        const startBtn = document.getElementById('start-trip-btn');
        startBtn.disabled = !(total > 0 && packed === total);
      }

      function renderCategories() {
        const container = document.getElementById('categories');
        container.innerHTML = '';
        const grouped = {};
        items.forEach(it => {
          const c = it.category || 'General';
          (grouped[c] = grouped[c] || []).push(it);
        });
        const categoryNames = Object.keys(grouped).sort();
        if (categoryNames.length === 0) categoryNames.push('General');
        categoryNames.forEach(cat => {
          container.appendChild(buildCategoryCard(cat, grouped[cat] || []));
        });
      }

      function buildCategoryCard(category, catItems) {
        const card = document.createElement('section');
        card.className = 'category';
        card.dataset.category = category;

        const head = document.createElement('div');
        head.className = 'category-head';
        const title = document.createElement('h3');
        title.className = 'category-title';
        title.textContent = category;
        const count = document.createElement('span');
        count.className = 'category-count';
        count.textContent = catItems.length + ' ' + (catItems.length === 1 ? 'item' : 'items');
        head.append(title, count);
        card.appendChild(head);

        const hr = document.createElement('hr');
        hr.className = 'category-divider';
        card.appendChild(hr);

        const list = document.createElement('div');
        list.className = 'items-list';
        catItems.forEach(it => list.appendChild(buildItemRow(it)));
        card.appendChild(list);

        // Add-item UI
        const addBtn = document.createElement('button');
        addBtn.type = 'button';
        addBtn.className = 'add-item-btn';
        addBtn.textContent = '+ Add item';

        const form = document.createElement('form');
        form.className = 'add-item-form';
        form.setAttribute('novalidate', '');
        form.innerHTML =
          '<input type="text" placeholder="Item name" required autocomplete="off" maxlength="120">' +
          '<button type="submit">Add</button>' +
          '<button type="button" class="cancel">Cancel</button>';

        addBtn.addEventListener('click', () => {
          form.classList.add('open');
          addBtn.style.display = 'none';
          form.querySelector('input').focus();
        });
        form.querySelector('.cancel').addEventListener('click', () => {
          form.classList.remove('open');
          form.reset();
          addBtn.style.display = '';
        });
        form.addEventListener('submit', async (e) => {
          e.preventDefault();
          const input = form.querySelector('input');
          const name = input.value.trim();
          if (!name) return;
          const submitBtn = form.querySelector('button[type="submit"]');
          submitBtn.disabled = true;
          submitBtn.textContent = '…';
          try {
            const created = await api('/trips/' + tripId + '/items', {
              method: 'POST',
              body: JSON.stringify({ name, category }),
            });
            const newItem = (created && created.item) || created;
            if (newItem && newItem.itemId) {
              items.push(newItem);
            } else {
              // Defensive re-fetch if backend returned an unexpected shape
              const fresh = await api('/trips/' + tripId + '/items');
              items = Array.isArray(fresh) ? fresh : (fresh && fresh.items) || [];
            }
            renderCategories();
            updateProgress();
          } catch (err) {
            alert('Could not add item: ' + err.message);
          } finally {
            submitBtn.disabled = false;
            submitBtn.textContent = 'Add';
          }
        });

        card.append(addBtn, form);
        return card;
      }

      function buildItemRow(item) {
        const row = document.createElement('div');
        row.className = 'item' + (item.packed ? ' packed' : '');
        row.dataset.itemId = item.itemId;
        row.setAttribute('role', 'button');
        row.setAttribute('tabindex', '0');
        row.setAttribute('aria-pressed', item.packed ? 'true' : 'false');
        row.innerHTML =
          '<span class="item-check" aria-hidden="true"></span>' +
          '<span class="item-name"></span>';
        row.querySelector('.item-name').textContent = item.name || '';
        const toggle = () => togglePacked(item, row);
        row.addEventListener('click', toggle);
        row.addEventListener('keydown', (e) => {
          if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); toggle(); }
        });
        return row;
      }

      async function togglePacked(item, row) {
        const next = !item.packed;
        // optimistic UI
        item.packed = next;
        row.classList.toggle('packed', next);
        row.setAttribute('aria-pressed', next ? 'true' : 'false');
        updateProgress();
        try {
          await api('/trips/' + tripId + '/items/' + item.itemId, {
            method: 'PATCH',
            body: JSON.stringify({ packed: next }),
          });
        } catch (err) {
          // revert
          item.packed = !next;
          row.classList.toggle('packed', item.packed);
          row.setAttribute('aria-pressed', item.packed ? 'true' : 'false');
          updateProgress();
          alert('Could not update item: ' + err.message);
        }
      }

      async function startTrip() {
        const btn = document.getElementById('start-trip-btn');
        if (btn.disabled) return;
        btn.disabled = true;
        try {
          await api('/trips/' + tripId, {
            method: 'PATCH',
            body: JSON.stringify({ status: 'active' }),
          });
          window.location.href = 'index.html';
        } catch (err) {
          alert('Could not start trip: ' + err.message);
          btn.disabled = false;
        }
      }

      async function cancelTrip() {
        if (!confirm('Cancel this trip? This cannot be undone.')) return;
        const btn = document.getElementById('cancel-trip-btn');
        btn.disabled = true;
        try {
          await api('/trips/' + tripId, { method: 'DELETE' });
          window.location.href = 'index.html';
        } catch (err) {
          alert('Could not cancel trip: ' + err.message);
          btn.disabled = false;
        }
      }

      /* ---------- Boot ---------- */
      document.addEventListener('DOMContentLoaded', async () => {
        document.getElementById('theme-toggle').addEventListener('click', () => {
          const next = root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
          localStorage.setItem(THEME_KEY, next);
          applyTheme(next);
        });
        document.getElementById('logout-btn').addEventListener('click', () => {
          sessionStorage.removeItem('authToken');
          sessionStorage.removeItem('currentUser');
          window.location.href = 'login.html';
        });
        document.getElementById('start-trip-btn').addEventListener('click', startTrip);
        document.getElementById('cancel-trip-btn').addEventListener('click', cancelTrip);

        try {
          const [tripData, itemsData] = await Promise.all([
            api('/trips/' + tripId),
            api('/trips/' + tripId + '/items'),
          ]);
          trip = (tripData && tripData.trip) || tripData || {};
          items = Array.isArray(itemsData) ? itemsData : (itemsData && itemsData.items) || [];
          renderHeader();
          renderCategories();
        } catch (err) {
          document.getElementById('categories').innerHTML =
            '<div class="empty"><strong>Could not load checklist</strong>' +
            escapeHtml(err.message) + '</div>';
        }
      });
    })();
  </script>
</body>
</html>
