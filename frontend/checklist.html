<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checklist - TrailPack</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <nav class="navbar">
    <div class="nav-brand">⛺ TrailPack</div>
    <div class="nav-links">
      <a href="index.html">← Back to Dashboard</a>
      <button onclick="logout()">Logout</button>
    </div>
  </nav>
  <main class="container">
    <div id="trip-header"></div>
    <div id="progress-section"></div>
    <div id="checklist-grid"></div>
    <div id="add-item-section"></div>
  </main>
  <script>
  document.addEventListener('DOMContentLoaded', async function() {
    const token = sessionStorage.getItem('authToken');
    if (!token) { window.location.href = 'login.html'; return; }
    const tripId = new URLSearchParams(window.location.search).get('tripId');
    if (!tripId) { window.location.href = 'index.html'; return; }
    // Fetch trip + items
    const [tripRes, itemsRes] = await Promise.all([
      fetch(`http://localhost:3000/trips/${tripId}`, { headers: { 'Authorization': 'Bearer ' + token } }),
      fetch(`http://localhost:3000/trips/${tripId}/items`, { headers: { 'Authorization': 'Bearer ' + token } })
    ]);
    const trip = await tripRes.json();
    const itemsData = await itemsRes.json();
    const items = itemsData.items || itemsData || [];
    // Render trip header
    document.getElementById('trip-header').innerHTML = `
      <h1>${trip.name || trip.trip?.name}</h1>
      <div class="badges">
        <span class="badge">${trip.terrain || trip.trip?.terrain}</span>
        <span class="badge">${trip.season || trip.trip?.season}</span>
        <span class="badge">${trip.duration || trip.trip?.duration} days</span>
      </div>
    `;
    // Render progress bar
    function updateProgress() {
      const total = items.length;
      const packed = items.filter(i => i.packed).length;
      const pct = total ? Math.round(packed/total*100) : 0;
      document.getElementById('progress-section').innerHTML = `
        <div class="progress-bar-container">
          <div class="progress-bar-fill" style="width:${pct}%"></div>
        </div>
        <p>${packed}/${total} items packed (${pct}%)</p>
      `;
    }
    updateProgress();
    // Group items by category
    function renderItems() {
      const grouped = {};
      items.forEach(item => {
        const cat = item.category || 'General';
        if (!grouped[cat]) grouped[cat] = [];
        grouped[cat].push(item);
      });
      let html = '<div class="checklist-grid">';
      for (const [category, catItems] of Object.entries(grouped)) {
        html += `<div class="category-column">
          <h3>${category}</h3>
          <div class="category-divider"></div>
          ${catItems.map(item => `
            <div class="checklist-item ${item.packed ? 'packed' : ''}" id="item-${item.itemId}">
              <input type="checkbox" ${item.packed ? 'checked' : ''}
                onchange="toggleItem('${item.itemId}', this.checked)">
              <span>${item.name}</span>
            </div>
          `).join('')}
        </div>`;
      }
      html += '</div>';
      document.getElementById('checklist-grid').innerHTML = html;
    }
    renderItems();
    // Toggle item packed state
    window.toggleItem = async function(itemId, packed) {
      const item = items.find(i => i.itemId === itemId);
      if (item) item.packed = packed;
      updateProgress();
      await fetch(`http://localhost:3000/trips/${tripId}/items/${itemId}`, {
        method: 'PATCH',
        headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
        body: JSON.stringify({ packed })
      });
    };
    // Logout
    window.logout = function() {
      sessionStorage.removeItem('authToken');
      window.location.href = 'login.html';
    };
  });
  </script>
</body>
</html>
