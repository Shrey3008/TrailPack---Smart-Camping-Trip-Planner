<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checklist - TrailPack</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <nav class="navbar">
    <div class="nav-brand">
      <h1>TrailPack</h1>
      <span class="tagline">Smart Camping Trip Planner</span>
    </div>
    <div class="nav-links">
      <span id="user-name" class="user-greeting"></span>
      <a href="dashboard.html" class="nav-link">← Back to Dashboard</a>
    </div>
  </nav>

  <main class="container">
    <div id="trip-details" class="trip-details">
      <!-- Trip info will be loaded here -->
    </div>

    <div class="checklist-container">
      <div class="checklist-header">
        <h2>Packing Checklist</h2>
        <div class="progress-section">
          <span id="progress-text">0/0 items packed</span>
          <div class="progress-bar">
            <div id="progress-fill" class="progress-fill" style="width: 0%"></div>
          </div>
        </div>
      </div>

      <!-- Trip Status Controls -->
      <div id="trip-status-controls" class="trip-status-controls" style="margin-bottom: 20px; padding: 15px; background: #f8f9fa; border-radius: 8px; display: none;">
        <h3>Trip Status</h3>
        <div style="display: flex; gap: 10px; flex-wrap: wrap;">
          <button id="btn-start-trip" class="btn btn-primary" style="display: none;">🚀 Start Trip</button>
          <button id="btn-complete-trip" class="btn btn-success" style="display: none;">✅ Complete Trip</button>
          <button id="btn-cancel-trip" class="btn btn-danger" style="display: none;">❌ Cancel Trip</button>
          <button id="btn-reset-trip" class="btn btn-secondary" style="display: none;">🔄 Reset to Planning</button>
        </div>
      </div>

      <!-- Completion Message -->
      <div id="completion-message" class="completion-message" style="display: none; margin-bottom: 20px; padding: 20px; background: linear-gradient(135deg, #4caf50 0%, #45a049 100%); color: white; border-radius: 8px; text-align: center;">
        <h2>🎉 All Packed & Ready!</h2>
        <p>Your checklist is complete. Have an amazing trip!</p>
      </div>

      <div class="add-item-section">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
          <h3>Add Custom Item</h3>
          <button id="btn-uncheck-all" class="btn btn-warning" style="display: none;">↩️ Uncheck All</button>
        </div>
        <form id="add-item-form" class="add-item-form">
          <input type="text" id="new-item-name" placeholder="Item name" required>
          <select id="new-item-category" required>
            <option value="">Select category</option>
            <option value="Clothing">Clothing</option>
            <option value="Shelter">Shelter</option>
            <option value="Food & Water">Food & Water</option>
            <option value="Safety">Safety</option>
            <option value="Tools">Tools</option>
          </select>
          <button type="submit" class="btn btn-secondary">Add Item</button>
        </form>
      </div>

      <div id="checklist-categories">
        <!-- Checklist items will be organized by category here -->
      </div>

      <div id="recommendations-section" class="recommendations-section" style="display: none;">
        <h3>💡 Smart Recommendations</h3>
        <div id="recommendations-list"></div>
      </div>
    </div>
  </main>

  <script src="auth.js"></script>
  <script src="app.js"></script>
  <script>
    // Load checklist when page loads
    document.addEventListener('DOMContentLoaded', () => {
      checkAuth();
      const urlParams = new URLSearchParams(window.location.search);
      const tripId = urlParams.get('id');
      if (tripId) {
        loadChecklist(tripId);
        loadRecommendations(tripId);
      } else {
        window.location.href = 'dashboard.html';
      }
    });

    document.getElementById('add-item-form').addEventListener('submit', (e) => {
      e.preventDefault();
      const urlParams = new URLSearchParams(window.location.search);
      const tripId = urlParams.get('id');
      handleAddItem(tripId);
    });
  </script>
</body>
</html>
