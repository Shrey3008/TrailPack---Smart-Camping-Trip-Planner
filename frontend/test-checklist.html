<!DOCTYPE html>
<html>
<head>
  <title>Test Checklist Redirect</title>
</head>
<body>
  <h1>Checklist Redirect Test</h1>
  <div id="log"></div>
  <button onclick="testRedirect()">Test Redirect to Checklist</button>
  
  <script>
    function log(msg) {
      document.getElementById('log').innerHTML += '<p>' + msg + '</p>';
      console.log(msg);
    }
    
    // Check if we were redirected here with a tripId
    const urlParams = new URLSearchParams(window.location.search);
    const tripId = urlParams.get('tripId');
    
    log('Current URL: ' + window.location.href);
    log('Search params: ' + window.location.search);
    log('tripId from URL: ' + tripId);
    
    function testRedirect() {
      const testTripId = 'test-trip-123';
      const url = 'checklist.html?tripId=' + encodeURIComponent(testTripId);
      log('Redirecting to: ' + url);
      window.location.href = url;
    }
  </script>
</body>
</html>
