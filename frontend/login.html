<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - TrailPack</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="auth-page">
  <div class="auth-container">
    <div class="auth-box">
      <div class="auth-header">
        <h1><span class="logo-icon">⛺</span> TrailPack</h1>
        <p>Smart Camping Trip Planner</p>
      </div>
      
      <form id="login-form" class="auth-form">
        <h2>Welcome Back</h2>
        
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" autocomplete="email" required placeholder="Enter your email">
        </div>
        
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" autocomplete="current-password" required placeholder="Enter your password">
        </div>
        
        <div id="error-message" class="error-message" style="display: none;"></div>
        
        <button type="submit" class="btn btn-primary btn-full">Login</button>
        
        <div class="auth-links">
          <p>Don't have an account? <a href="register.html">Sign up</a></p>
        </div>
      </form>
    </div>
  </div>

  <script>
    const API_URL = 'http://localhost:3000';
    window.authToken = null;

    // Handle login form submission
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const errorDiv = document.getElementById('error-message');
      const submitBtn = e.target.querySelector('button[type="submit"]');
      
      try {
        submitBtn.disabled = true;
        submitBtn.textContent = 'Logging in...';
        errorDiv.style.display = 'none';
        const response = await fetch(`${API_URL}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        
        const data = await response.json();
        
        if (!response.ok) {
          throw new Error(data.message || 'Login failed');
        }
        
        // Store token in sessionStorage for persistence across pages
        sessionStorage.setItem('authToken', data.token);
        sessionStorage.setItem('currentUser', JSON.stringify(data.user));
        
        window.location.href = 'index.html';
        
      } catch (error) {
        errorDiv.textContent = error.message || 'Invalid email or password';
        errorDiv.style.display = 'block';
        submitBtn.disabled = false;
        submitBtn.textContent = 'Login';
      }
    });
  </script>
</body>
</html>
